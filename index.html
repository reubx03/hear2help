<!DOCTYPE html>
<html>

<head>
  <title>Railway Assistant</title>
  <style>
    :root {
      --primary: #4f46e5;
      --bg: #0b1220;
      --text: #ffffff;
      --accent: #10b981;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .container {
      max-width: 600px;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 2rem;
      background: linear-gradient(45deg, #4f46e5, #818cf8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .mic-button {
      background: var(--primary);
      border: none;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 0 30px rgba(79, 70, 229, 0.4);
      margin-bottom: 2rem;
    }

    .mic-button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 50px rgba(79, 70, 229, 0.6);
    }

    .mic-button:disabled {
      background: #374151;
      cursor: not-allowed;
      box-shadow: none;
    }

    .mic-button svg {
      width: 50px;
      height: 50px;
      fill: white;
    }

    #status {
      font-size: 1.2rem;
      margin-top: 1rem;
      color: #94a3b8;
      font-weight: 500;
      min-height: 1.5rem;
    }

    #output {
      margin-top: 2rem;
      font-size: 1.4rem;
      line-height: 1.6;
      background: rgba(255, 255, 255, 0.05);
      padding: 1.5rem;
      border-radius: 12px;
      display: none;
    }

    .loader {
      display: none;
      width: 48px;
      height: 48px;
      border: 5px solid #FFF;
      border-bottom-color: var(--primary);
      border-radius: 50%;
      box-sizing: border-box;
      animation: rotation 1s linear infinite;
      margin: 1rem auto;
    }

    @keyframes rotation {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .listening-pulse {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.7);
      }

      70% {
        box-shadow: 0 0 0 20px rgba(79, 70, 229, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(79, 70, 229, 0);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Railway Assistant</h1>

    <button id="micBtn" class="mic-button" onclick="startListening()">
      <svg viewBox="0 0 24 24">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
        <path
          d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
      </svg>
    </button>

    <div class="loader" id="loader"></div>
    <p id="status">Tap the mic to start</p>
    <div id="output"></div>
  </div>

  <script>
  let recorder;
  let audioChunks = [];

  function updateStatus(msg) {
    document.getElementById("status").innerText = msg;
  }

  async function startListening() {
    const micBtn = document.getElementById("micBtn");
    const loader = document.getElementById("loader");
    const output = document.getElementById("output");

    output.style.display = "none";
    micBtn.classList.add("listening-pulse");
    updateStatus("Listening...");

    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

      // 🔥 Force supported MIME type
      let options = {};
      if (MediaRecorder.isTypeSupported("audio/webm")) {
        options.mimeType = "audio/webm";
      } else if (MediaRecorder.isTypeSupported("audio/ogg")) {
        options.mimeType = "audio/ogg";
      }

      recorder = new MediaRecorder(stream, options);
      console.log("Recording with MIME:", recorder.mimeType);

      audioChunks = [];

      recorder.ondataavailable = (e) => {
        if (e.data.size > 0) {
          audioChunks.push(e.data);
        }
      };

      recorder.onstop = async () => {
        micBtn.classList.remove("listening-pulse");
        micBtn.disabled = true;
        loader.style.display = "block";

        // 🔥 Use actual mime type
        const blob = new Blob(audioChunks, { type: recorder.mimeType });

        const formData = new FormData();
        formData.append("audio", blob, "recording.webm"); // filename matters!

        try {
          const response = await fetch("/listen", {
            method: "POST",
            body: formData,
          });

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          while (true) {
            const { value, done } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop();

            for (const line of lines) {
              if (!line.trim()) continue;
              const msg = JSON.parse(line);

              if (msg.type === "status") {
                updateStatus(msg.text);
              } else if (msg.type === "result") {
                loader.style.display = "none";
                micBtn.disabled = false;
                updateStatus("Ready");

                output.innerText = msg.data.text;
                output.style.display = "block";

                if (msg.data.audio) {
                  const audio = new Audio(msg.data.audio);
                  audio.play();
                }
              } else if (msg.type === "error") {
                throw new Error(msg.text);
              }
            }
          }
        } catch (err) {
          console.error(err);
          loader.style.display = "none";
          micBtn.disabled = false;
          updateStatus("Error: " + err.message);
          //updateStatus("തൃപ്പൂണിത്തുറയിൽ നിന്ന് കോഴിക്കോട് വരെ പോകുന്ന അടുത്ത ട്രെയിൻ മലബാർ എക്സ്പ്രസ് ആണ്. ഇന്ന് രാത്രി 11 മണി 25 മിനിറ്റിന് അത് പുറപ്പെടും.");
        }

        // 🔥 Stop mic tracks completely
        stream.getTracks().forEach(track => track.stop());
      };

      recorder.start();
      setTimeout(() => recorder.stop(), 6000);

    } catch (err) {
      console.error(err);
      updateStatus("Microphone access denied or unavailable.");
      micBtn.classList.remove("listening-pulse");
    }
  }
</script>

</body>

</html>
